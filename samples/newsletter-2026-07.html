<script>
const NL={"subject":"[정보보호의 날 특집] 보이는 게 다가 아닙니다 — '한 번 더 확인'이 회사를 지킵니다","intro":"안녕하세요, 정보보호팀입니다.\n\n7월은 **정보보호의 날**이 있는 달입니다. 최근 1년간 금융권을 흔든 사고들을 모아보니 한 가지 공통점이 보였습니다. 공격자들은 더 이상 우리 '담장'을 힘으로 부수지 않습니다. 대신 **신뢰를 빌려 정문으로 걸어 들어옵니다.**\n\n- 아는 사람의 **얼굴과 목소리**를 복제하고 (딥페이크·AI 음성)\n- 우리가 믿는 **협력사·외주업체**를 먼저 뚫고 (공급망)\n- **퇴직자·내부직원의 권한**을 그대로 악용합니다 (내부자·권한 관리)\n\n그래서 이달의 메시지는 단 하나입니다. 👉 **\"보이고 들리고 연결된 것을 무조건 믿지 말고, 약속된 채널로 한 번 더 확인하기.\"** 3분만 투자해 끝까지 읽어주세요. 오늘 바로 실천할 수 있는 내용입니다.","headlines":[{"title":"총리·은행 임원이 전부 가짜였다 — '딥페이크 줌 회의'에 속아 58억 원 송금","summary":"2026년 5월 싱가포르의 한 사업가가 AI 딥페이크로 조작된 가짜 화상회의에 초대돼 약 58억 원을 송금했습니다. 회의에는 총리·대통령·통화청 관계자·글로벌 금융사 임원까지 전원 딥페이크로 등장했습니다. 비슷하게 홍콩에서는 본사 임원을 합성한 딥페이크 회의로 직원이 약 345억 원을 보냈습니다(헤럴드경제 2025.8.8). 핵심: 화면에 아는 얼굴이 '실시간'으로 보여도 그 자체로는 신원 증명이 되지 않습니다. 송금·계좌변경 지시는 반드시 사전에 약속한 직통 콜백 등 별도 채널로 다시 확인하세요.","source":"다음뉴스(뉴스1) 2026.5.23","link":"https://v.daum.net/v/20260523070651240"},{"title":"외주 IT업체 한 곳 뚫리자 자산운용사 28곳이 무너졌다 — '코리안 리크스' 공급망 랜섬웨어","summary":"랜섬웨어 조직 킬린(Qilin)이 국내 금융사들의 서버를 위탁 운영하던 외주 전산업체를 먼저 침해한 뒤, 그 관리자 권한을 타고 고객사 내부로 옮겨 다니며 총 28개 금융기관을 연쇄 공격했습니다. 100만 개 이상 파일과 약 2TB 데이터가 유출됐습니다. 핵심: 우리 회사 보안이 아무리 견고해도 '여러 금융사가 함께 쓰는 외주업체' 한 곳이 뚫리면 우리 데이터도 함께 새어 나갑니다. 협력사에 준 관리자 계정·원격접속 권한은 최소한으로, 그리고 상시 점검 대상입니다.","source":"Bitdefender Business Insights 2025.11.24 / 보안뉴스·데일리시큐 2025.11","link":"https://www.bitdefender.com/en-us/blog/businessinsights/korean-leaks-campaign-targets-south-korean-financial-services-qilin-ransomware"},{"title":"퇴사한 직원이 인증키로 3,750만 명 정보 유출 — 사상 최대 6,246억 원 과징금","summary":"쿠팡 전직 직원이 재직 시절 접근했던 인증서명키로 약 3,750만 명의 개인정보를 빼냈고, 개인정보보호위원회는 역대 최대인 6,246억 원의 과징금을 부과했습니다(2026.6.11). 원인은 정교한 해킹이 아니라 '불필요한 직원까지 인증키를 볼 수 있게 두고, 퇴사자 키를 즉시 폐기하지 않은' 기본 관리 부실이었습니다. 비슷하게 신한카드에서는 직원 12명이 약 3년간 가맹점주 정보 19만여 건을 화면 촬영·수기로 빼돌리다 적발됐습니다(보안뉴스 2025.12.24). 핵심: '필요 최소 권한', 퇴사·인사이동 시 권한 즉시 정리, 계정·인증키 공유 금지가 곧 수천억을 가르는 기본입니다.","source":"파이낸셜뉴스 2026.6.11 / 보안뉴스 2025.12.24","link":"https://www.fnnews.com/news/202606111039375345"},{"title":"8년간 안 고친 취약점 하나로 297만 명 카드정보 유출 — 그리고 따라온 2차 피싱","summary":"2025년 롯데카드에서 약 297만 명의 개인신용정보가 유출됐는데, 원인은 2017년에 이미 패치가 나온 취약점(CVE-2017-10271)을 8년간 적용하지 않은 것이었습니다. 더 무서운 건 유출 직후, 그 고객 정보를 악용한 '2차 피싱'이 곧바로 따라왔다는 점입니다. 핵심: (1) 시스템·단말 업데이트를 미루지 마세요 — 패치 지연이 곧 대형 사고입니다. (2) 대형 유출 뉴스 뒤에는 반드시 정교한 사칭 문자·메일·전화가 따라옵니다. 의심되면 회사 공식 채널로 다시 확인하세요.","source":"경향신문 2025.9.22 / 데일리시큐·보안뉴스 2025","link":"https://www.khan.co.kr/article/202509220700001"}],"deep_dive":{"heading":"최근 1년 사고들이 가리키는 한 방향 — '신뢰'가 새로운 공격 표적입니다","body":"최근 사고들을 하나씩 보면 다르지만, 멀리서 보면 똑같은 그림입니다. **공격자는 시스템을 부수는 대신, 우리가 평소에 믿는 것을 위조하거나 빌렸습니다.**\n\n**1) 보이고 들리는 것을 더는 믿을 수 없습니다**\nAI는 통화 첫마디 '여보세요' 3초만으로 목소리를 복제하고, 화상회의 참석자 얼굴을 통째로 합성합니다. 딥페이크 회의로 58억 원(싱가포르)·345억 원(홍콩)이 실제로 송금됐습니다. 가족·상사·거래처의 '목소리'와 '영상'은 이제 본인 확인 수단이 아닙니다.\n> ✅ **실천:** 금전·계좌변경·인증정보 요청은 영상·음성으로 확인했더라도, *사전에 약속한 별도 채널(직통 콜백 등)*로 다시 확인합니다. '긴급·비밀·윗선 지시'로 절차를 건너뛰라는 압박은 그 자체가 위험 신호입니다.\n\n**2) 연결된 것(협력사·벤더)을 통해 들어옵니다**\n외주 전산업체 한 곳이 뚫려 자산운용사 28곳이 연쇄 침해됐고(코리안 리크스), 해외에서도 핀테크 벤더 한 곳 사고로 미국 은행·신협 74곳이 피해를 봤습니다(마르키스 사고). 우리 담장이 멀쩡해도 협력사가 뚫리면 우리 데이터가 함께 샙니다.\n> ✅ **실천:** 외부 위탁업체에 부여한 관리자 계정·원격접속 권한은 최소화하고 상시 점검합니다. VPN·원격접속은 '패치'만으로 끝이 아니라 *자격증명 재설정 + MFA*가 필수입니다.\n\n**3) 권한·인증키 관리 부실이 천문학적 비용이 됩니다**\n쿠팡 사고(3,750만 명, 과징금 6,246억 원)와 신한카드 내부자 사고(19만여 건)는 외부 해킹이 핵심이 아니었습니다. 퇴직자 권한 미회수, 불필요한 인증키 접근, 내부직원의 화면 촬영이 원인이었습니다. 게다가 개인정보 유출 과징금 상한이 매출의 3%에서 **최대 10%**로 강화되는 법 개정안이 국회 정무위를 통과하며(2025.12), 단 한 건의 유출도 회사 존립을 위협하는 비용이 됐습니다.\n> ✅ **실천:** '필요 최소 권한' 원칙을 지키고, 인사이동·퇴사 시 권한을 즉시 정리합니다. 계정·인증키 공유 금지, 고객정보 사적 메모·캡처 금지 — '걸리지 않는다'는 생각은 통하지 않습니다(공익신고로 적발됩니다).\n\n결국 최근 사고들의 교훈은 한 문장입니다. **\"확인 한 번 더\"가 가장 싸고 가장 강력한 보안 장치입니다.**"},"tip":"📌 오늘의 1분 실천 체크 — ① 출처 의심되는 링크(경조사·택배·기관 안내 문자 포함)는 누르지 말고 발신자에게 직접 전화로 확인 ② '원격제어 앱 설치/화면 공유' 요구는 100% 사기 신호 → 즉시 통화 종료 ③ 거래처 '계좌 변경' 통보는 메일 회신 말고 기존에 알던 번호로 직접 확인 ④ 송금·인증정보 요청은 영상·음성으로 봤어도 약속된 채널로 재확인 ⑤ 내가 쓰는 계정·권한 중 더 이상 필요 없는 게 있다면 정리 요청.","closing":"최근 사고들이 공통으로 말해주는 건, 결국 '사람'이 마지막 방어선이라는 사실입니다. 거창한 장비보다 **여러분의 '한 번 더 확인'하는 습관**이 회사와 동료, 그리고 고객을 지킵니다. 의심되는 상황이 있으면 혼자 판단하지 마시고 언제든 정보보호팀으로 연락 주세요. 함께 지키겠습니다. 안전한 7월 보내세요! 🔐"};
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function safeUrl(u){return /^https?:\/\//i.test(u||'')?u:'';}
function inline(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}
function md(text){
  const raw=(text||'').split("\n");let html="",inList=false,inQ=false,qb=[];
  const fq=()=>{if(inQ){html+='<blockquote class="q">'+qb.join("<br>")+'</blockquote>';qb=[];inQ=false;}};
  const fl=()=>{if(inList){html+="</ul>";inList=false;}};
  for(const line of raw){
    const q=line.match(/^\s*(?:>|&gt;)\s?(.*)$/);
    if(q){fl();inQ=true;qb.push(inline(q[1]));continue;}
    fq();
    if(/^\s*[-*] /.test(line)){if(!inList){html+="<ul>";inList=true;}html+="<li>"+inline(line.replace(/^\s*[-*] /,""))+"</li>";continue;}
    fl();
    if(line.trim()==="")continue;
    html+="<p>"+inline(line)+"</p>";
  }
  fq();fl();return html;
}
function render(nl){
  const heads=(nl.headlines||[]).map(h=>{const link=safeUrl(h.link);
    return '<div class="card"><div class="t">'+esc(h.title)+'</div><div class="sm">'+md(h.summary)+'</div><div class="src">'+esc(h.source)+(link?' · <a href="'+link+'" target="_blank" rel="noopener">원문 ↗</a>':'')+'</div></div>';}).join("");
  const dd=nl.deep_dive||{};
  document.getElementById('root').innerHTML=
    '<h1 class="s">'+esc(nl.subject)+'</h1><div>'+md(nl.intro)+'</div>'+
    '<h3 class="h">📰 이달의 보안 뉴스</h3>'+heads+
    '<h3 class="h">🔎 '+esc(dd.heading)+'</h3><div>'+md(dd.body)+'</div>'+
    '<div class="tip"><strong>💡 이달의 팁</strong> '+esc(nl.tip)+'</div>'+
    '<div class="closing">'+md(nl.closing)+'</div>';
}
render(NL);
</script></body></html>
