<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>secuday — 정보보호의 날 보안 인식 자료</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1 onclick="showList()">🛡️ secuday</h1>
      <span class="subtitle">매월 1일 정보보호의 날 — 임직원 보안 인식 자료</span>
      <a class="btn small" href="admin.html">관리자 로그인 →</a>
    </header>

    <main id="main">
      <!-- 목록 -->
      <section id="view-list" class="view">
        <div id="material-cards" class="cards"></div>
        <p id="empty-msg" class="empty" hidden>아직 등록된 자료가 없습니다.</p>
      </section>

      <!-- 상세 (읽기 전용) -->
      <section id="view-detail" class="view" hidden>
        <div class="detail-head">
          <button class="btn small" onclick="showList()">← 목록</button>
          <h2 id="detail-title"></h2>
          <span id="detail-badge" class="badge"></span>
        </div>

        <nav class="tabs">
          <button class="tab active" data-tab="content" onclick="switchTab('content')">자료 보기</button>
          <button class="tab" data-tab="history" onclick="switchTab('history')">버전 이력</button>
        </nav>

        <div id="tab-content" class="tabpane">
          <div class="detail-grid">
            <div id="poster-box" class="poster-box"></div>
            <div>
              <h3 id="content-theme" class="theme"></h3>
              <div id="content-body" class="content-body"></div>
              <h3>임직원 수칙</h3>
              <ol id="content-rules" class="rules"></ol>
            </div>
          </div>
        </div>

        <div id="tab-history" class="tabpane" hidden>
          <table class="vtable">
            <thead><tr><th>버전</th><th>제목</th><th>변경 메모</th><th>구분</th><th>일시</th></tr></thead>
            <tbody id="version-rows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="public.js"></script>
</body>
</html>
