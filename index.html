<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>secuday — 정보보호의 날 보안 인식 자료</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1 onclick="showList()">🛡️ secuday</h1>
      <span class="subtitle">매월 1일 정보보호의 날 — 임직원 보안 인식 자료</span>
      <a class="btn small" href="admin.html">관리자 로그인 →</a>
    </header>

    <main id="main">
      <!-- 목록 -->
      <section id="view-list" class="view">
        <div id="material-cards" class="cards"></div>
        <p id="empty-msg" class="empty" hidden>아직 등록된 자료가 없습니다.</p>
      </section>

      <!-- 상세 (읽기 전용) — 뉴스레터 단일 화면 -->
      <section id="view-detail" class="view" hidden>
        <div class="detail-head">
          <button class="btn small" onclick="showList()">← 목록</button>
          <h2 id="detail-title"></h2>
          <span id="detail-badge" class="badge"></span>
          <div class="spacer"></div>
          <button class="btn" onclick="downloadNewsletterPdf()">📄 PDF 다운로드</button>
        </div>
        <div id="audio-section" class="audio-section"></div>
        <div id="nl-preview" class="nl-preview"></div>
        <div id="rules-section" class="rules-section"></div>
        <div id="poster-section" class="poster-section"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="newsletter-template.js"></script>
  <script src="public.js"></script>
</body>
</html>
