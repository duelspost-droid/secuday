# secuday Supabase 설정
# project_id 는 `supabase link --project-ref <ref>` 시 자동으로 채워집니다.
project_id = "secuday"

[functions.ai-ask]
verify_jwt = true   # 로그인한 임직원만 호출 가능

[functions.generate-poster]
verify_jwt = true   # cron/관리자는 service_role 또는 JWT로 호출

[functions.send-mailing]
verify_jwt = true   # 관리자/cron은 JWT 또는 service_role로 호출

[functions.generate-newsletter]
verify_jwt = true   # 로그인한 임직원만 호출 가능
